services:
  - type: web
    name: document-analyzer
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update
      apt-get install -y tesseract-ocr poppler-utils
    startCommand: python app.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: API_KEY
        sync: false